name: Release MyCodeBuddy

on:
  push:
    tags:
      - "v*.*.*-mycodebuddy.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-draft-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_body: ${{ steps.release.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify fork repository
        shell: bash
        run: |
          if [[ "$GITHUB_REPOSITORY" != "icannotwait/MyCodeBuddy" ]]; then
            echo "::error::Release workflow may run only for icannotwait/MyCodeBuddy."
            exit 1
          fi

      - name: Check tag commit belongs to default branch
        shell: bash
        run: |
          set -euo pipefail
          default_branch="${{ github.event.repository.default_branch }}"
          git fetch origin "$default_branch"

          tag_commit="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          if git merge-base --is-ancestor "$tag_commit" "origin/$default_branch"; then
            echo "Tag $GITHUB_REF_NAME is based on $default_branch."
          else
            echo "::error::Tag $GITHUB_REF_NAME is not based on $default_branch."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Verify release configuration
        shell: bash
        run: node scripts/check-release-config.mjs --tag "$GITHUB_REF_NAME"

      - id: release
        name: Create or reuse draft release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const { owner, repo } = context.repo;
            const prerelease = false;
            const releaseName = `MyCodeBuddy ${tag}`;
            const { data: tagRef } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `tags/${tag}`,
            });

            let commitSha = tagRef.object.sha;
            if (tagRef.object.type === "tag") {
              const { data: annotatedTag } = await github.rest.git.getTag({
                owner,
                repo,
                tag_sha: commitSha,
              });
              if (annotatedTag.object.type !== "commit") {
                core.setFailed(
                  `Tag ${tag} points to ${annotatedTag.object.type}, not a commit.`,
                );
                return;
              }
              commitSha = annotatedTag.object.sha;
            }

            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: commitSha,
            });
            const releaseBody =
              commit.commit.message?.trim() || "_No commit message._";
            let release;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              if (!existing.data.draft) {
                core.setFailed(
                  `Release for tag ${tag} already exists and is not a draft.`,
                );
                return;
              }

              release = existing.data;
              if (
                release.prerelease !== prerelease ||
                release.name !== releaseName ||
                (release.body ?? "").trim() !== releaseBody
              ) {
                const updated = await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: release.id,
                  name: releaseName,
                  prerelease: false,
                  body: releaseBody,
                });
                release = updated.data;
              }
              core.info(`Reusing existing draft release #${release.id}`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease: false,
              });
              release = created.data;
              core.info(`Created draft release #${release.id}`);
            }

            core.setOutput("release_id", String(release.id));
            core.setOutput("release_body", releaseBody);

  build-desktop:
    needs: create-draft-release
    name: Desktop ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2022
            target: x86_64-pc-windows-msvc
            sidecar: codeg-mcp-x86_64-pc-windows-msvc.exe
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: desktop-${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate third-party licenses
        run: pnpm licenses:generate

      - name: Stage desktop sidecars
        run: pnpm tauri:prepare-sidecars --target ${{ matrix.target }}

      - name: Verify desktop sidecars
        shell: pwsh
        run: |
          $sidecars = @(
            "src-tauri/binaries/${{ matrix.sidecar }}",
            "src-tauri/binaries/codex-acp-x86_64-pc-windows-msvc.exe"
          )
          foreach ($sidecar in $sidecars) {
            if (-not (Test-Path -LiteralPath $sidecar -PathType Leaf)) {
              throw "Missing staged sidecar: $sidecar"
            }
            if ((Get-Item -LiteralPath $sidecar).Length -le 0) {
              throw "Staged sidecar is empty: $sidecar"
            }
          }

      - name: Install host Codex CLI for smoke
        shell: pwsh
        run: |
          npm install -g @openai/codex@0.144.1
          $codex = $null
          $cmd = Get-Command codex -ErrorAction SilentlyContinue
          if ($cmd) { $codex = $cmd.Source }
          if (-not $codex) {
            $candidate = Join-Path $env:APPDATA "npm\codex.cmd"
            if (Test-Path -LiteralPath $candidate) { $codex = $candidate }
          }
          if (-not $codex) {
            throw "Host Codex CLI not found after npm install -g @openai/codex@0.144.1"
          }
          "CODEX_PATH=$codex" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "CODEX_PATH=$codex"

      - name: Smoke test bundled Codex ACP
        run: >-
          node src-tauri/scripts/smoke-codex-acp.mjs
          src-tauri/binaries/codex-acp-x86_64-pc-windows-msvc.exe

      - name: Build and upload desktop release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-draft-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseBody: ${{ needs.create-draft-release.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          tauriScript: pnpm tauri
          args: --config src-tauri/tauri.release.conf.json --target ${{ matrix.target }} --bundles nsis
          includeUpdaterJson: true
          retryAttempts: 2

  build-server:
    needs: create-draft-release
    name: Server Windows x64
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          shared-key: server-x86_64-pc-windows-msvc

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate third-party licenses
        run: pnpm licenses:generate

      - name: Build frontend
        run: pnpm build

      - name: Build server executables
        working-directory: src-tauri
        run: |
          cargo build --release --bin codeg-server --no-default-features --target x86_64-pc-windows-msvc
          cargo build --release --bin codeg-mcp --no-default-features --target x86_64-pc-windows-msvc

      - name: Package server bundle
        shell: pwsh
        run: |
          $artifact = "codeg-server-windows-x64"
          $bundleDir = "dist/$artifact"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item "src-tauri/target/x86_64-pc-windows-msvc/release/codeg-server.exe" "$bundleDir/codeg-server.exe"
          Copy-Item "src-tauri/target/x86_64-pc-windows-msvc/release/codeg-mcp.exe" "$bundleDir/codeg-mcp.exe"
          Copy-Item -Recurse "out" "$bundleDir/web"
          Copy-Item "LICENSE" "$bundleDir/LICENSE"
          Copy-Item "NOTICE" "$bundleDir/NOTICE"
          Copy-Item "src-tauri/resources/THIRD_PARTY_LICENSES.txt" "$bundleDir/THIRD_PARTY_LICENSES.txt"

          foreach ($required in @(
            "$bundleDir/codeg-server.exe",
            "$bundleDir/codeg-mcp.exe",
            "$bundleDir/web",
            "$bundleDir/LICENSE",
            "$bundleDir/NOTICE",
            "$bundleDir/THIRD_PARTY_LICENSES.txt"
          )) {
            if (-not (Test-Path -LiteralPath $required)) {
              throw "Missing server bundle entry: $required"
            }
          }

          Compress-Archive -Path $bundleDir -DestinationPath "dist/$artifact.zip"

      - name: Smoke test codeg-mcp
        shell: pwsh
        run: |
          $help = & "dist/codeg-server-windows-x64/codeg-mcp.exe" --help
          if ($LASTEXITCODE -ne 0) {
            throw "codeg-mcp.exe --help failed with exit code $LASTEXITCODE"
          }
          if ($help -notlike "*codeg-mcp --parent-connection-id*") {
            throw "codeg-mcp.exe --help returned unexpected output"
          }

      - name: Sign and checksum server bundle
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $zip = "dist/codeg-server-windows-x64.zip"
          pnpm tauri signer sign $zip
          if ($LASTEXITCODE -ne 0) {
            throw "Tauri signer failed with exit code $LASTEXITCODE"
          }
          if (-not (Test-Path -LiteralPath "$zip.sig" -PathType Leaf)) {
            throw "Tauri signer did not produce $zip.sig"
          }

          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          "$hash  codeg-server-windows-x64.zip" |
            Out-File -Encoding ascii "dist/codeg-server-windows-x64.zip.sha256"

      - name: Upload server release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$env:GITHUB_REF_NAME" `
            "dist/codeg-server-windows-x64.zip" `
            "dist/codeg-server-windows-x64.zip.sig" `
            "dist/codeg-server-windows-x64.zip.sha256" `
            --clobber

  publish-release:
    needs:
      - create-draft-release
      - build-desktop
      - build-server
    if: ${{ needs.build-desktop.result == 'success' && needs.build-server.result == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const releaseId = Number(
              "${{ needs.create-draft-release.outputs.release_id }}",
            );

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: releaseId,
              draft: false,
              prerelease: false,
            });

            core.info(`Published release #${releaseId}`);
